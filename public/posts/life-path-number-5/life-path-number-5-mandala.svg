  <path d="M 704.0 568.1 Q 784.1 512.0, 816.6 413.0 Q 732.2 352.0, 634.3 353.8 Z" fill="#7CC8A5" fill-opacity="0.20" stroke="#B8893E" stroke-width="2.2" stroke-opacity="0.9"/>
  <path d="M 518.0 711.9 Q 596.1 770.8, 700.2 771.1 Q 732.2 672.0, 700.3 579.5 Z" fill="#7CC8A5" fill-opacity="0.20" stroke="#B8893E" stroke-width="2.2" stroke-opacity="0.9"/>
  <path d="M 323.7 579.5 Q 291.8 672.0, 323.8 771.1 Q 427.9 770.8, 506.0 711.9 Z" fill="#7CC8A5" fill-opacity="0.20" stroke="#B8893E" stroke-width="2.2" stroke-opacity="0.9"/>
  <path d="M 389.7 353.8 Q 291.8 352.0, 207.4 413.0 Q 239.9 512.0, 320.0 568.1 Z" fill="#7CC8A5" fill-opacity="0.20" stroke="#B8893E" stroke-width="2.2" stroke-opacity="0.9"/>

