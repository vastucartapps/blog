         <text y="9" font-family="Georgia, serif" font-size="26" fill="#7CC8A5" text-anchor="middle" font-weight="600">☿</text>
       </g>
  <g transform="translate(873.6 629.5)">
         <circle r="22" fill="#013F47" stroke="#B8893E" stroke-width="1.4"/>
         <text y="9" font-family="Georgia, serif" font-size="26" fill="#7CC8A5" text-anchor="middle" font-weight="600">☿</text>
       </g>
  <g transform="translate(512.0 892.3)">
         <circle r="22" fill="#013F47" stroke="#B8893E" stroke-width="1.4"/>
         <text y="9" font-family="Georgia, serif" font-size="26" fill="#7CC8A5" text-anchor="middle" font-weight="600">☿</text>
       </g>
  <g transform="translate(150.4 629.5)">
         <circle r="22" fill="#013F47" stroke="#B8893E" stroke-width="1.4"/>
         <text y="9" font-family="Georgia, serif" font-size="26" fill="#7CC8A5" text-anchor="middle" font-weight="600">☿</text>
       </g>
  <g transform="translate(288.5 204.4)">
