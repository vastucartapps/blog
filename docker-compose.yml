services:
  postgres:
    image: postgres:15-alpine
    container_name: vastucart_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: vastucart
      POSTGRES_PASSWORD: vastucart
      POSTGRES_DB: vastucart_blog
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vastucart -d vastucart_blog"]
      interval: 5s
      timeout: 5s
      retries: 10

  meilisearch:
    image: getmeili/meilisearch:v1.10
    container_name: vastucart_meilisearch
    restart: unless-stopped
    environment:
      MEILI_MASTER_KEY: ${MEILISEARCH_KEY:-devmasterkey}
      MEILI_NO_ANALYTICS: "true"
      MEILI_ENV: development
    ports:
      - "7700:7700"
    volumes:
      - meili_data:/meili_data
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:7700/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  pg_data:
  meili_data:
