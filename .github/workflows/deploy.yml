name: Deploy to Coolify

# Auto-deploy on every push to main. The job calls the Coolify API
# with a bearer token stored as a GitHub secret. Coolify then queues
# a fresh build of the application and rolls it out.
#
# Required secrets (set via `gh secret set`):
#   COOLIFY_URL       — base URL of the Coolify instance, no trailing slash
#   COOLIFY_TOKEN     — API token with deploy permission
#   COOLIFY_APP_UUID  — uuid of the blog application

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Trigger Coolify deploy
    runs-on: ubuntu-latest
    steps:
      - name: Trigger deployment with retry
        env:
          COOLIFY_URL: ${{ secrets.COOLIFY_URL }}
          COOLIFY_TOKEN: ${{ secrets.COOLIFY_TOKEN }}
          COOLIFY_APP_UUID: ${{ secrets.COOLIFY_APP_UUID }}
        run: |
          set -euo pipefail
          echo "Triggering Coolify deploy for ${COOLIFY_APP_UUID}"

          # Retry up to 5 times with exponential backoff. Coolify
          # occasionally has 30-60 second connectivity blips and we
          # don't want a single transient failure to drop a deploy.
          attempt=1
          max_attempts=5
          while [ $attempt -le $max_attempts ]; do
            echo "Attempt ${attempt}/${max_attempts}..."
            if response=$(curl -fsS --max-time 30 --connect-timeout 15 \
                -H "Authorization: Bearer ${COOLIFY_TOKEN}" \
                "${COOLIFY_URL}/api/v1/deploy?uuid=${COOLIFY_APP_UUID}&force=false" 2>&1); then
              echo "Response: ${response}"
              if echo "${response}" | grep -q deployment_uuid; then
                echo "✓ Deploy queued successfully on attempt ${attempt}"
                exit 0
              fi
              echo "Response did not contain deployment_uuid, retrying..."
            else
              echo "curl failed on attempt ${attempt}: ${response}"
            fi
            attempt=$((attempt + 1))
            if [ $attempt -le $max_attempts ]; then
              sleep_time=$((attempt * 10))
              echo "Waiting ${sleep_time}s before next attempt..."
              sleep ${sleep_time}
            fi
          done

          echo "ERROR: All ${max_attempts} attempts failed. Coolify is unreachable." >&2
          exit 1
