<svg xmlns="http://www.w3.org/2000/svg"
     width="1024" height="1024" viewBox="0 0 1024 1024"
     role="img" aria-label="Number 6 mandala with Venus sigils on the rim">
  <defs>
    <radialGradient id="bgRadial" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#FBF6E8"/>
      <stop offset="80%" stop-color="#F2EAD3"/>
      <stop offset="100%" stop-color="#ECE0C5"/>
    </radialGradient>
    <radialGradient id="centreGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#F2C8D8" stop-opacity="0.6"/>
      <stop offset="60%" stop-color="#F2C8D8" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#F2C8D8" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1024" height="1024" fill="url(#bgRadial)"/>

  <!-- Decorative outer ring -->
  <circle cx="512" cy="512" r="430" fill="none" stroke="#B8893E" stroke-width="1" opacity="0.45"/>
  <circle cx="512" cy="512" r="440" fill="none" stroke="#B8893E" stroke-width="0.6" opacity="0.30"/>

  <!-- Centre glow -->
  <circle cx="512" cy="512" r="390" fill="url(#centreGlow)"/>

  <!-- Sigils on rim -->
  <g transform="translate(707.0 174.3)">
         <circle r="22" fill="#013F47" stroke="#B8893E" stroke-width="1.4"/>
         <text y="9" font-family="Georgia, serif" font-size="26" fill="#F2C8D8" text-anchor="middle" font-weight="600">♀</text>
       </g>
  <g transform="translate(902.0 512.0)">
         <circle r="22" fill="#013F47" stroke="#B8893E" stroke-width="1.4"/>
         <text y="9" font-family="Georgia, serif" font-size="26" fill="#F2C8D8" text-anchor="middle" font-weight="600">♀</text>
       </g>
  <g transform="translate(707.0 849.7)">
         <circle r="22" fill="#013F47" stroke="#B8893E" stroke-width="1.4"/>
         <text y="9" font-family="Georgia, serif" font-size="26" fill="#F2C8D8" text-anchor="middle" font-weight="600">♀</text>
       </g>
  <g transform="translate(317.0 849.7)">
         <circle r="22" fill="#013F47" stroke="#B8893E" stroke-width="1.4"/>
         <text y="9" font-family="Georgia, serif" font-size="26" fill="#F2C8D8" text-anchor="middle" font-weight="600">♀</text>
       </g>
  <g transform="translate(122.0 512.0)">
         <circle r="22" fill="#013F47" stroke="#B8893E" stroke-width="1.4"/>
         <text y="9" font-family="Georgia, serif" font-size="26" fill="#F2C8D8" text-anchor="middle" font-weight="600">♀</text>
       </g>
  <g transform="translate(317.0 174.3)">
         <circle r="22" fill="#013F47" stroke="#B8893E" stroke-width="1.4"/>
         <text y="9" font-family="Georgia, serif" font-size="26" fill="#F2C8D8" text-anchor="middle" font-weight="600">♀</text>
       </g>

  <!-- Lotus petals -->
  <path d="M 607.7 336.4 Q 584.0 243.5, 512.0 182.0 Q 440.0 243.5, 416.3 336.4 Z" fill="#F2C8D8" fill-opacity="0.20" stroke="#B8893E" stroke-width="2.2" stroke-opacity="0.9"/>
  <path d="M 711.9 507.0 Q 780.5 440.0, 797.8 347.0 Q 708.6 315.4, 616.3 341.3 Z" fill="#F2C8D8" fill-opacity="0.20" stroke="#B8893E" stroke-width="2.2" stroke-opacity="0.9"/>
  <path d="M 616.3 682.7 Q 708.6 708.6, 797.8 677.0 Q 780.5 584.0, 711.9 517.0 Z" fill="#F2C8D8" fill-opacity="0.20" stroke="#B8893E" stroke-width="2.2" stroke-opacity="0.9"/>
  <path d="M 416.3 687.6 Q 440.0 780.5, 512.0 842.0 Q 584.0 780.5, 607.7 687.6 Z" fill="#F2C8D8" fill-opacity="0.20" stroke="#B8893E" stroke-width="2.2" stroke-opacity="0.9"/>
  <path d="M 312.1 517.0 Q 243.5 584.0, 226.2 677.0 Q 315.4 708.6, 407.7 682.7 Z" fill="#F2C8D8" fill-opacity="0.20" stroke="#B8893E" stroke-width="2.2" stroke-opacity="0.9"/>
  <path d="M 407.7 341.3 Q 315.4 315.4, 226.2 347.0 Q 243.5 440.0, 312.1 507.0 Z" fill="#F2C8D8" fill-opacity="0.20" stroke="#B8893E" stroke-width="2.2" stroke-opacity="0.9"/>

  <!-- Inner disc -->
  <circle cx="512" cy="512" r="200" fill="#FBF6E8" stroke="#B8893E" stroke-width="2.4"/>
  <circle cx="512" cy="512" r="186" fill="none" stroke="#F2C8D8" stroke-width="1.6" opacity="0.55"/>
  <circle cx="512" cy="512" r="172" fill="none" stroke="#B8893E" stroke-width="0.8" opacity="0.4"/>

  <!-- Devanagari label arched above the numeral -->
  <text x="512" y="412" text-anchor="middle"
