<svg xmlns="http://www.w3.org/2000/svg"
     width="1024" height="1024" viewBox="0 0 1024 1024"
     role="img" aria-label="Number 4 mandala with Rahu sigils on the rim">
  <defs>
    <radialGradient id="bgRadial" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#FBF6E8"/>
      <stop offset="80%" stop-color="#F2EAD3"/>
      <stop offset="100%" stop-color="#ECE0C5"/>
    </radialGradient>
    <radialGradient id="centreGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#9B7CB7" stop-opacity="0.6"/>
      <stop offset="60%" stop-color="#9B7CB7" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#9B7CB7" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1024" height="1024" fill="url(#bgRadial)"/>

  <!-- Decorative outer ring -->
  <circle cx="512" cy="512" r="410.5" fill="none" stroke="#B8893E" stroke-width="1" opacity="0.45"/>
  <circle cx="512" cy="512" r="420.5" fill="none" stroke="#B8893E" stroke-width="0.6" opacity="0.30"/>

  <!-- Centre glow -->
  <circle cx="512" cy="512" r="370.5" fill="url(#centreGlow)"/>

  <!-- Sigils on rim -->
  <g transform="translate(774.0 250.0)">
         <circle r="22" fill="#013F47" stroke="#B8893E" stroke-width="1.4"/>
         <text y="9" font-family="Georgia, serif" font-size="26" fill="#9B7CB7" text-anchor="middle" font-weight="600">☊</text>
       </g>
  <g transform="translate(774.0 774.0)">
         <circle r="22" fill="#013F47" stroke="#B8893E" stroke-width="1.4"/>
         <text y="9" font-family="Georgia, serif" font-size="26" fill="#9B7CB7" text-anchor="middle" font-weight="600">☊</text>
       </g>
  <g transform="translate(250.0 774.0)">
         <circle r="22" fill="#013F47" stroke="#B8893E" stroke-width="1.4"/>
         <text y="9" font-family="Georgia, serif" font-size="26" fill="#9B7CB7" text-anchor="middle" font-weight="600">☊</text>
       </g>
  <g transform="translate(250.0 250.0)">
         <circle r="22" fill="#013F47" stroke="#B8893E" stroke-width="1.4"/>
         <text y="9" font-family="Georgia, serif" font-size="26" fill="#9B7CB7" text-anchor="middle" font-weight="600">☊</text>
       </g>

  <!-- Lotus petals -->
  <path d="M 648.0 365.4 Q 613.9 266.0, 512.0 201.5 Q 410.1 266.0, 376.0 365.4 Z" fill="#9B7CB7" fill-opacity="0.20" stroke="#B8893E" stroke-width="2.2" stroke-opacity="0.9"/>
  <path d="M 658.6 648.0 Q 758.0 613.9, 822.5 512.0 Q 758.0 410.1, 658.6 376.0 Z" fill="#9B7CB7" fill-opacity="0.20" stroke="#B8893E" stroke-width="2.2" stroke-opacity="0.9"/>
  <path d="M 376.0 658.6 Q 410.1 758.0, 512.0 822.5 Q 613.9 758.0, 648.0 658.6 Z" fill="#9B7CB7" fill-opacity="0.20" stroke="#B8893E" stroke-width="2.2" stroke-opacity="0.9"/>
  <path d="M 365.4 376.0 Q 266.0 410.1, 201.5 512.0 Q 266.0 613.9, 365.4 648.0 Z" fill="#9B7CB7" fill-opacity="0.20" stroke="#B8893E" stroke-width="2.2" stroke-opacity="0.9"/>

  <!-- Inner disc -->
  <circle cx="512" cy="512" r="200" fill="#FBF6E8" stroke="#B8893E" stroke-width="2.4"/>
  <circle cx="512" cy="512" r="186" fill="none" stroke="#9B7CB7" stroke-width="1.6" opacity="0.55"/>
  <circle cx="512" cy="512" r="172" fill="none" stroke="#B8893E" stroke-width="0.8" opacity="0.4"/>

  <!-- Devanagari label arched above the numeral -->
  <text x="512" y="412" text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif" font-size="34"
        fill="#7D5519" letter-spacing="3" opacity="0.85">राहु</text>

  <!-- Big numeral -->
  <text x="512" y="592" text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif" font-size="280"
        fill="#9B7CB7" font-weight="700">4</text>

  <!-- Caption -->
  <text x="512" y="917.5" text-anchor="middle"
        font-family="Georgia, serif" font-size="16"
        fill="#013F47" opacity="0.85" letter-spacing="2.5"
        font-weight="500">LIFE PATH 4 · RAHU (RAHU)</text>
  <text x="512" y="944.5" text-anchor="middle"
        font-family="Georgia, serif" font-size="13"
        fill="#7D5519" opacity="0.75" letter-spacing="1.8"
        font-style="italic">Vedic Numerology Mandala · VastuCart Editorial</text>
</svg>
