<svg xmlns="http://www.w3.org/2000/svg"
     width="1024" height="1024" viewBox="0 0 1024 1024"
     role="img" aria-label="Number 5 mandala with Mercury sigils on the rim">
  <defs>
    <radialGradient id="bgRadial" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#FBF6E8"/>
      <stop offset="80%" stop-color="#F2EAD3"/>
      <stop offset="100%" stop-color="#ECE0C5"/>
    </radialGradient>
    <radialGradient id="centreGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7CC8A5" stop-opacity="0.6"/>
      <stop offset="60%" stop-color="#7CC8A5" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#7CC8A5" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1024" height="1024" fill="url(#bgRadial)"/>

  <!-- Decorative outer ring -->
  <circle cx="512" cy="512" r="420.25" fill="none" stroke="#B8893E" stroke-width="1" opacity="0.45"/>
  <circle cx="512" cy="512" r="430.25" fill="none" stroke="#B8893E" stroke-width="0.6" opacity="0.30"/>

  <!-- Centre glow -->
  <circle cx="512" cy="512" r="380.25" fill="url(#centreGlow)"/>

